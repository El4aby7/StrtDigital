<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create account — VEYRA</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2314110f'/%3E%3Ctext x='16' y='22' font-family='serif' font-size='16' fill='%23f7f4ef' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main">
    <div class="auth-wrap">
      <section class="auth-visual"><div class="auth-bg" id="auth-bg"></div>
        <div><span class="eyebrow" style="color:var(--gold)">Join VEYRA</span><h2 style="color:#fff;font-size:var(--fs-2xl)">Become a member</h2><p style="color:rgba(255,255,255,.8);max-width:34ch">Get 10% off your first order, early access to drops and members-only offers.</p></div>
      </section>
      <div class="auth-form">
        <nav class="auth-tabs"><a href="login.html">Sign in</a><a href="register.html" aria-current="page">Create account</a></nav>
        <h1>Create account</h1>
        <p class="muted" style="margin-bottom:1.5rem">It takes less than a minute.</p>
        <form id="auth-form" class="flow" novalidate data-auth="register">
          <div class="form-grid">
            <div class="field"><label for="fname">First name</label><input class="input" id="fname" required autocomplete="given-name"><span class="field-error"></span></div>
            <div class="field"><label for="lname">Last name</label><input class="input" id="lname" required autocomplete="family-name"><span class="field-error"></span></div>
          </div>
          <div class="field"><label for="email">Email</label><input class="input" id="email" type="email" required autocomplete="email"><span class="field-error"></span></div>
          <div class="field"><label for="password">Password</label><input class="input" id="password" type="password" required minlength="6" autocomplete="new-password"><span class="field-error"></span>
            <div class="meter" id="pw-meter" style="height:4px;border-radius:99px;background:var(--line);overflow:hidden;margin-top:.4rem"><div id="pw-fill" style="height:100%;width:0;transition:width .3s,background .3s"></div></div>
          </div>
          <label class="checkbox"><input type="checkbox" id="terms" required> I agree to the <a class="link-underline" href="#">Terms</a> & <a class="link-underline" href="#">Privacy Policy</a></label>
          <span class="field-error" id="terms-error"></span>
          <button class="btn btn--accent btn--block btn--lg" type="submit">Create account</button>
        </form>
        <div class="divider" style="margin-block:1.5rem">or continue with</div>
        <div class="social-auth">
          <button class="btn btn--social btn--block" data-social="Google">Continue with Google</button>
          <button class="btn btn--social btn--block" data-social="Apple">Continue with Apple</button>
        </div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
