<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — VEYRA</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2314110f'/%3E%3Ctext x='16' y='22' font-family='serif' font-size='16' fill='%23f7f4ef' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main">
    <div class="auth-wrap">
      <section class="auth-visual"><div class="auth-bg" id="auth-bg"></div>
        <div><span class="eyebrow" style="color:var(--gold)">Members</span><h2 style="color:#fff;font-size:var(--fs-2xl)">Welcome back to VEYRA</h2><p style="color:rgba(255,255,255,.8);max-width:34ch">Track orders, save your wishlist and check out faster.</p></div>
      </section>
      <div class="auth-form">
        <nav class="auth-tabs"><a href="login.html" aria-current="page">Sign in</a><a href="register.html">Create account</a></nav>
        <h1>Sign in</h1>
        <p class="muted" style="margin-bottom:1.5rem">Enter your details to access your account.</p>
        <form id="auth-form" class="flow" novalidate data-auth="login">
          <div class="field"><label for="email">Email</label><input class="input" id="email" type="email" required autocomplete="email"><span class="field-error"></span></div>
          <div class="field"><label for="password">Password</label><input class="input" id="password" type="password" required autocomplete="current-password" minlength="6"><span class="field-error"></span></div>
          <div style="display:flex;justify-content:space-between;align-items:center">
            <label class="checkbox"><input type="checkbox"> Remember me</label>
            <a class="link-underline" href="forgot-password.html">Forgot password?</a>
          </div>
          <button class="btn btn--accent btn--block btn--lg" type="submit">Sign in</button>
        </form>
        <div class="divider" style="margin-block:1.5rem">or continue with</div>
        <div class="social-auth">
          <button class="btn btn--social btn--block" data-social="Google">Continue with Google</button>
          <button class="btn btn--social btn--block" data-social="Apple">Continue with Apple</button>
        </div>
        <p class="muted" style="margin-top:1.5rem;text-align:center">New here? <a class="link-underline" href="register.html">Create an account</a></p>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
