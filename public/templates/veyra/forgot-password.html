<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reset password — VEYRA</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%2314110f'/%3E%3Ctext x='16' y='22' font-family='serif' font-size='16' fill='%23f7f4ef' text-anchor='middle'%3EV%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div id="site-header"></div>

  <main id="main">
    <div class="auth-wrap">
      <section class="auth-visual"><div class="auth-bg" id="auth-bg"></div>
        <div><span class="eyebrow" style="color:var(--gold)">Account</span><h2 style="color:#fff;font-size:var(--fs-2xl)">Forgot your password?</h2><p style="color:rgba(255,255,255,.8);max-width:34ch">No problem — we'll send you a secure link to set a new one.</p></div>
      </section>
      <div class="auth-form">
        <h1>Reset password</h1>
        <p class="muted" style="margin-bottom:1.5rem">Enter the email associated with your account and we'll email a reset link.</p>
        <form id="auth-form" class="flow" novalidate data-auth="forgot">
          <div class="field"><label for="email">Email</label><input class="input" id="email" type="email" required autocomplete="email"><span class="field-error"></span></div>
          <button class="btn btn--accent btn--block btn--lg" type="submit">Send reset link</button>
          <p class="form-msg" role="status" style="color:var(--ok);min-height:1.2em"></p>
        </form>
        <p class="muted" style="margin-top:1.5rem;text-align:center">Remembered it? <a class="link-underline" href="login.html">Back to sign in</a></p>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>
  <script src="assets/js/data.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
