<!DOCTYPE html>
<!-- Maison — furniture template: room-by-room eCommerce with a product grid, quick-view (material/size options drive price), an add-to-cart preview drawer and simulated checkout. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Maison — Furniture for the way you live</title>
  <meta name="description" content="Maison is a warm furniture storefront with room-by-room shopping, made-to-order materials, and free delivery.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%232b2722'/%3E%3Cpath d='M7 18v6m18-6v6M6 13h20v6H6z' fill='none' stroke='%23c98a5e' stroke-width='2'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#shop">Skip to shop</a>
  <div id="site-header"></div>

  <main id="main">
    <!-- HERO -->
    <section class="hero" id="home">
      <div class="container hero__grid">
        <div class="hero__copy">
          <span class="eyebrow" data-reveal>New season · 2026</span>
          <h1 class="display" data-reveal>Furniture for<br>the way you live.</h1>
          <p class="lede" data-reveal>Made-to-order pieces in natural materials, built to last decades — not seasons. Free delivery and 100-night returns.</p>
          <div class="hero__cta" data-reveal>
            <a class="btn btn--accent btn--lg" href="#shop">Shop the collection</a>
            <a class="btn btn--ghost btn--lg" href="#rooms">Shop by room</a>
          </div>
        </div>
        <div class="hero__art" data-reveal><div id="hero-img"></div></div>
      </div>
    </section>

    <!-- ROOMS -->
    <section class="section section--tight" id="rooms">
      <div class="container">
        <div class="rooms" id="rooms-grid"></div>
      </div>
    </section>

    <!-- SHOP -->
    <section class="section" id="shop">
      <div class="container">
        <div class="section-head">
          <div><span class="eyebrow" data-reveal>The collection</span><h2 class="h2" data-reveal>Shop by room</h2></div>
        </div>
        <div class="roomtabs" id="room-tabs" data-reveal></div>
        <div class="product-grid" id="product-grid"></div>
      </div>
    </section>

    <!-- PROMISE -->
    <section class="section promise">
      <div class="container"><div class="promise__grid" id="promise-grid"></div></div>
    </section>
  </main>

  <div id="site-footer"></div>

  <!-- QUICK VIEW -->
  <div class="modal" id="qv-modal" hidden>
    <div class="modal__scrim" data-qv-close></div>
    <div class="modal__panel" role="dialog" aria-modal="true"><button class="modal__close" data-qv-close aria-label="Close">&times;</button><div id="qv-body"></div></div>
  </div>

  <!-- CART DRAWER -->
  <div class="drawer" id="drawer" hidden>
    <div class="drawer__scrim" data-drawer-close></div>
    <aside class="drawer__panel" role="dialog" aria-modal="true" aria-label="Your bag">
      <header class="drawer__head"><h3>Your bag</h3><button class="drawer__close" data-drawer-close aria-label="Close">&times;</button></header>
      <div class="drawer__body" id="cart-items"></div>
      <div class="drawer__empty" id="cart-empty"><p>Your bag is empty.</p><button class="btn btn--ghost btn--sm" data-drawer-close>Keep shopping</button></div>
      <footer class="drawer__foot" id="cart-foot" hidden>
        <div class="drawer__line"><span>Subtotal</span><strong id="cart-subtotal">$0</strong></div>
        <div class="drawer__line drawer__line--muted"><span>Delivery</span><span>Free</span></div>
        <button class="btn btn--accent btn--block" id="checkout-btn">Checkout</button>
        <p class="form-msg" id="cart-msg" role="status"></p>
      </footer>
    </aside>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="assets/js/data.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
